stages:
  - test

static_analysis:
  stage: test
  image: python:3.11-slim
  tags:
    - shared
    - docker
  script:
    - pip install ruff pylint flake8 mypy bandit pip-audit semgrep streamlit requests pytest coverage
    - ruff check app.py
    - ruff format --check app.py
    - pylint app.py --disable=C0114,C0115,C0116
    - flake8 app.py --max-line-length=88
    - mypy --ignore-missing-imports app.py
    - bandit -r app.py
    - pip-audit --allow-empty
    - semgrep --config=auto app.py || true

unit_testing:
  stage: test
  image: python:3.11-slim
  tags:
    - shared
    - docker
  script:
    - pip install streamlit requests pytest coverage
    - coverage run -m pytest test_app.py
    - coverage report -m