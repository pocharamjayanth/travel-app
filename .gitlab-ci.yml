stages:
  - lint
  - format
  - type_check
  - test
  - coverage

lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check app.py

format:
  stage: format
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff format --check app.py

type_check:
  stage: type_check
  image: python:3.11-slim
  script:
    - pip install mypy streamlit requests
    - mypy --ignore-missing-imports app.py

test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install streamlit requests pytest coverage
    - coverage run -m pytest test_app.py

coverage:
  stage: coverage
  image: python:3.11-slim
  script:
    - pip install coverage
    - coverage report -m
