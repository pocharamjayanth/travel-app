stages:
  - lint
  - format
  - type_check
  - test
  - security
  - coverage

lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff pylint flake8
    - ruff check app.py
    - pylint app.py --disable=C0114,C0115,C0116
    - flake8 app.py --max-line-length=88

format:
  stage: format
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff format --check app.py

type_check:
  stage: type_check
  image: python:3.11-slim
  script:
    - pip install mypy streamlit requests
    - mypy --ignore-missing-imports app.py

test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install streamlit requests pytest coverage
    - coverage run -m pytest test_app.py

security:
  stage: security
  image: python:3.11-slim
  script:
    - pip install bandit pip-audit semgrep
    - bandit -r app.py
    - pip-audit --allow-empty
    - semgrep --config=auto app.py
  allow_failure: true

coverage:
  stage: coverage
  image: python:3.11-slim
  script:
    - pip install coverage
    - coverage report -m
