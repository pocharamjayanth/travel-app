[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "B", "I", "UP"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pylint]
max-line-length = 88
disable = ["C0114", "C0115", "C0116"]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]

[tool.vulture]
min_confidence = 80
paths = ["app.py"]
exclude = [".venv"]
